<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Source panel stack</title>
  <desc id="desc">A diagram showing how the contracts page groups each program's Cargo file, Rust source, state layout, errors, and SDK file into one inspection panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#080d13"/><stop offset="1" stop-color="#14170d"/></linearGradient>
    <style>.label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}.title{font:850 42px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}.panel{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:18}.tab{fill:#0d1a22;stroke:#31546b;stroke-width:1;rx:10}.head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}.small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}.mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}</style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="70" y="78" class="label">SOURCE INSPECTION MODEL</text>
  <text x="70" y="132" class="title">Program panels keep source and SDK together.</text>
  <text x="70" y="168" class="copy">The page is useful when a reader can jump from role, to source, to account layout, to the matching SDK helper.</text>
  <rect class="panel" x="126" y="238" width="1028" height="384"/>
  <text x="170" y="292" class="head">Program panel</text><text x="170" y="326" class="small">role, program ID, account surface, dependency notes</text>
  <g transform="translate(170 372)"><rect class="tab" width="160" height="54"/><text x="22" y="34" class="mono">Cargo.toml</text><rect class="tab" x="178" width="160" height="54"/><text x="200" y="34" class="mono">lib.rs</text><rect class="tab" x="356" width="160" height="54"/><text x="378" y="34" class="mono">state.rs</text><rect class="tab" x="534" width="160" height="54"/><text x="556" y="34" class="mono">errors.rs</text><rect class="tab" x="712" width="160" height="54"/><text x="734" y="34" class="mono">sdk/*.ts</text></g>
  <rect x="170" y="476" width="872" height="84" rx="14" fill="#0b131c" stroke="#314b5d"/>
  <text x="198" y="508" class="mono">programs/nicechunk_chunk/src/lib.rs</text>
  <text x="198" y="536" class="small">reader sees exact source path, not a paraphrased copy of the implementation</text>
  <text x="322" y="668" class="copy">This structure turns the directory into an audit index instead of a static marketing page.</text>
</svg>
