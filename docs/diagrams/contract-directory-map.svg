<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Contract directory map</title>
  <desc id="desc">A diagram showing how the contract directory page connects program source files, SDK helpers, localized explanations, and integration flow cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080d13"/>
      <stop offset="1" stop-color="#14170d"/>
    </linearGradient>
    <style>
      .label{font:800 12px Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.16em;fill:#90ff1a}
      .title{font:850 42px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}
      .copy{font:500 17px Inter,ui-sans-serif,system-ui,sans-serif;fill:#b8c7d4}
      .box{fill:rgba(255,255,255,.06);stroke:rgba(255,255,255,.16);stroke-width:1.2;rx:16}
      .head{font:800 18px Inter,ui-sans-serif,system-ui,sans-serif;fill:#f3f8ff}
      .small{font:600 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#bdd0df}
      .mono{font:750 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#f7d98f}
      .line{stroke:#8fdcff;stroke-width:2.8;fill:none}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="70" y="78" class="label">CONTRACT DIRECTORY</text>
  <text x="70" y="132" class="title">A source browser for the current protocol surface.</text>
  <text x="70" y="168" class="copy">The page packages real Rust, SDK, IDs, PDA seeds, and integration notes into one developer-facing map.</text>

  <rect x="80" y="256" width="238" height="246" class="box"/>
  <text x="110" y="302" class="head">Bundled source</text>
  <text x="110" y="340" class="mono">Cargo.toml</text>
  <text x="110" y="368" class="mono">cluster_config.rs</text>
  <text x="110" y="396" class="mono">errors.rs</text>
  <text x="110" y="424" class="mono">lib.rs</text>
  <text x="110" y="452" class="mono">state.rs</text>

  <rect x="408" y="222" width="464" height="314" class="box"/>
  <text x="446" y="270" class="head">Program directory UI</text>
  <text x="446" y="306" class="small">program IDs and current status</text>
  <text x="446" y="336" class="small">account roles and dependency flow</text>
  <text x="446" y="366" class="small">source panels with syntax labels</text>
  <text x="446" y="396" class="small">localized technical copy</text>
  <g transform="translate(624 438)">
    <rect width="54" height="54" rx="10" fill="#14251b" stroke="#90ff1a"/>
    <rect x="74" width="54" height="54" rx="10" fill="#102236" stroke="#8fdcff"/>
    <rect x="148" width="54" height="54" rx="10" fill="#2a1f0f" stroke="#f7d98f"/>
  </g>

  <rect x="962" y="256" width="238" height="246" class="box"/>
  <text x="992" y="302" class="head">Readers</text>
  <text x="992" y="340" class="small">frontend integrators</text>
  <text x="992" y="370" class="small">protocol reviewers</text>
  <text x="992" y="400" class="small">auditors</text>
  <text x="992" y="430" class="small">new contributors</text>

  <path class="line" d="M318 380 H408"/>
  <path class="line" d="M872 380 H962"/>
  <text x="238" y="626" class="copy">The directory is not a replacement for program tests. It is a navigation layer that keeps implementation files visible.</text>
</svg>
